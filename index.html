<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Magnum Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#4fc3f7; --orange:#ff9800; --pink:#e91e8c;
  --bg:#f5f0eb; --white:#fff; --dark:#1a1a2e;
  --text:#2d2d3a; --dim:#6b6b80; --border:#e8e2da;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:16px;line-height:1.6;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 5vw;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;
  background:rgba(245,240,235,0.97);backdrop-filter:blur(10px);}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--dark);
  text-decoration:none;display:flex;align-items:center;gap:9px;cursor:pointer;border:none;background:none;}
.logo-stripes{display:flex;gap:3px;height:20px;align-items:flex-end;}
.logo-stripes span{width:5px;border-radius:3px;}
.logo-stripes span:nth-child(1){background:var(--blue);height:100%;}
.logo-stripes span:nth-child(2){background:var(--orange);height:72%;}
.logo-stripes span:nth-child(3){background:var(--pink);height:50%;}
.nav-back{display:none;align-items:center;gap:7px;background:none;border:none;cursor:pointer;
  font-size:.88rem;color:var(--dim);font-weight:500;font-family:'Inter',sans-serif;}
.nav-back:hover{color:var(--dark);}
.nav-back svg{width:16px;height:16px;}

/* HERO */
.hero{padding:4rem 5vw 3rem;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:0;left:5vw;width:150px;height:5px;border-radius:3px;
  background:linear-gradient(90deg,var(--blue) 33%,var(--orange) 33% 66%,var(--pink) 66%);}
.hero-eye{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:.8rem;font-weight:600;}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,6vw,3rem);font-weight:800;line-height:1.15;color:var(--dark);margin-bottom:.9rem;word-break:break-word;overflow-wrap:break-word;}
.hero h1 .b{color:var(--blue);} .hero h1 .o{color:var(--orange);} .hero h1 .p{color:var(--pink);}
.hero p{color:var(--dim);max-width:440px;font-size:.95rem;}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:.5rem;padding:2rem 5vw .5rem;flex-wrap:wrap;}
.cat-tab{padding:.55rem 1.4rem;border-radius:99px;border:2px solid var(--border);background:var(--white);
  font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--dim);font-family:'Inter',sans-serif;}
.cat-tab:hover{border-color:var(--dark);color:var(--dark);}
.cat-tab.active{color:var(--white);border-color:transparent;}

/* PLAYLIST GRID */
.pl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.3rem;padding:1.5rem 5vw 5rem;}
.pl-card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;
  cursor:pointer;transition:box-shadow .25s,transform .25s;display:flex;flex-direction:column;}
.pl-card:hover{box-shadow:0 8px 28px rgba(26,26,46,.11);transform:translateY(-3px);}
.pl-card-bar{height:5px;}
.pl-card-top{height:110px;display:flex;align-items:center;justify-content:center;font-size:3rem;}
.pl-card-body{padding:1.1rem 1.3rem 1.4rem;flex:1;display:flex;flex-direction:column;gap:.35rem;}
.pl-card-body h3{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--dark);}
.pl-card-body p{font-size:.83rem;color:var(--dim);flex:1;}
.pl-meta{display:flex;gap:.9rem;margin-top:.5rem;flex-wrap:wrap;}
.pl-meta span{font-size:.74rem;color:var(--dim);display:flex;align-items:center;gap:3px;}
.pl-arrow{margin-top:.8rem;display:inline-flex;align-items:center;gap:5px;font-size:.8rem;font-weight:600;}

/* ── PLAYLIST PAGE ── */
#page-playlist{display:none;}
.pl-hero{padding:2.8rem 5vw 2.2rem;border-bottom:1px solid var(--border);background:var(--white);}
.pl-hero-eye{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;margin-bottom:.6rem;}
.pl-hero h1{font-family:'Syne',sans-serif;font-size:clamp(1.4rem,5vw,2.4rem);font-weight:800;color:var(--dark);margin-bottom:.6rem;}
.pl-hero p{color:var(--dim);font-size:.93rem;max-width:500px;}
.pl-hero-stats{display:flex;gap:1.8rem;margin-top:1rem;flex-wrap:wrap;}
.pl-hero-stats span{font-size:.8rem;color:var(--dim);display:flex;align-items:center;gap:4px;font-weight:500;}
.pl-hero-stats strong{color:var(--dark);}

/* SECTIONS */
.sections-wrap{padding:2rem 5vw 3rem;display:flex;flex-direction:column;gap:2rem;}
.sec-block{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.sec-hdr{padding:1rem 1.4rem;display:flex;align-items:center;gap:.9rem;border-bottom:1px solid var(--border);}
.sec-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;color:var(--white);flex-shrink:0;}
.sec-hdr h3{font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;color:var(--dark);flex:1;}

/* VIDEO LIST */
.video-item{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.4rem;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;text-decoration:none;}
.video-item:hover{background:#faf8f5;}
.vid-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.vid-icon svg{fill:#fff;margin-left:2px;}
.vid-info{flex:1;}
.vid-info h4{font-size:.88rem;font-weight:600;color:var(--dark);line-height:1.3;}
.vid-info span{font-size:.74rem;color:var(--dim);}
.vid-ext{font-size:.72rem;color:var(--dim);white-space:nowrap;}

/* QUIZ */
.quiz-wrap{padding:1.4rem 1.4rem 1.6rem;}
.quiz-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.93rem;color:var(--dark);
  margin-bottom:1.1rem;display:flex;align-items:center;gap:.5rem;}
.quiz-q{margin-bottom:1.1rem;}
.quiz-q p{font-size:.88rem;font-weight:600;color:var(--dark);margin-bottom:.6rem;}
.quiz-options{display:flex;flex-direction:column;gap:.45rem;}
.quiz-opt{padding:.55rem .95rem;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);
  cursor:pointer;font-size:.84rem;color:var(--text);transition:all .15s;text-align:left;font-family:'Inter',sans-serif;}
.quiz-opt:hover:not(:disabled){background:var(--white);}
.quiz-opt.correct{border-color:#1a7a4a;background:#e6faf0;color:#1a7a4a;font-weight:600;}
.quiz-opt.wrong{border-color:#c0392b;background:#fdecea;color:#c0392b;}
.quiz-opt.selected{background:var(--white);}
.quiz-submit{margin-top:.7rem;padding:.5rem 1.3rem;border-radius:8px;border:none;cursor:pointer;
  font-size:.83rem;font-weight:600;color:var(--white);transition:opacity .2s;font-family:'Inter',sans-serif;}
.quiz-submit:disabled{opacity:.35;cursor:not-allowed;}
.quiz-submit:hover:not(:disabled){opacity:.85;}
.quiz-result{margin-top:.9rem;padding:.7rem .95rem;border-radius:8px;font-size:.86rem;font-weight:600;display:none;}
.quiz-result.pass{background:#e6faf0;color:#1a7a4a;display:block;}
.quiz-result.fail{background:#fdecea;color:#c0392b;display:block;}

/* FINAL EXAM */
.final-wrap{background:var(--white);border:2px solid var(--border);border-radius:16px;
  overflow:hidden;margin:0 5vw 5rem;}
.final-hdr{padding:1.1rem 1.4rem;display:flex;align-items:center;gap:.8rem;border-bottom:1px solid var(--border);}
.final-hdr h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--dark);}
.final-body{padding:1.4rem 1.4rem 1.6rem;}

/* FOOTER */
footer{background:var(--dark);padding:1.8rem 5vw;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
footer p{font-size:.8rem;color:#8888aa;}
.footer-stripes{display:flex;gap:4px;}
.footer-stripes span{display:inline-block;width:26px;height:4px;border-radius:2px;}
.footer-stripes span:nth-child(1){background:var(--blue);}
.footer-stripes span:nth-child(2){background:var(--orange);}
.footer-stripes span:nth-child(3){background:var(--pink);}

@media(max-width:600px){
  .hero{padding:3rem 5vw 2.5rem;}
  .pl-grid{grid-template-columns:1fr;}
  .cat-tabs{gap:.4rem;}
  .final-wrap{margin:0 4vw 4rem;}
}
</style>
</head>

// ═══════════════════════════════════════════════
//  QUIZ BUILDER
// ═══════════════════════════════════════════════
function buildQuiz(plId, secId, questions, accent, isFinal) {
  const prefix = `${plId}-${secId}`;
  let html = `<div class="quiz-title"><span>${isFinal ? '🏆' : '🧠'}</span> ${isFinal ? 'Final Exam' : 'Section Quiz'}</div>`;
  questions.forEach((q, qi) => {
    html += `<div class="quiz-q">
      <p>${qi+1}. ${q.q}</p>
      <div class="quiz-options">`;
    q.opts.forEach((opt, oi) => {
      html += `<button class="quiz-opt" id="qo-${prefix}-${qi}-${oi}"
        onclick="selectOpt('${prefix}',${qi},${oi},${q.ans},'${accent}',${questions.length})">${opt}</button>`;
    });
    html += `</div></div>`;
  });
  html += `<button class="quiz-submit" id="qs-${prefix}" style="background:${accent}"
    onclick="submitQuiz('${prefix}',${JSON.stringify(questions).replace(/'/g,"\\'")},'${accent}')" disabled>
    Submit ${isFinal ? 'Final Exam' : 'Quiz'}
  </button>`;
  html += `<div class="quiz-result" id="qr-${prefix}"></div>`;
  return html;
}

function selectOpt(prefix, qi, oi, correct, accent, total) {
  const key = `${prefix}-${qi}`;
  quizState[key] = oi;

  // style options
  const q = data.playlists.flatMap(p => [...p.sections.map(s=>s.quiz), [p.finalQuiz]]).flat();
  // just style visually
  for (let x = 0; x < 10; x++) {
    const btn = document.getElementById(`qo-${prefix}-${qi}-${x}`);
    if (!btn) break;
    btn.classList.remove("selected");
    btn.style.borderColor = "";
    btn.style.background = "";
  }
  const sel = document.getElementById(`qo-${prefix}-${qi}-${oi}`);
  if (sel) { sel.style.borderColor = accent; sel.style.background = accent+"22"; }

  // check all answered
  let all = true;
  for (let q2 = 0; q2 < total; q2++) {
    if (quizState[`${prefix}-${q2}`] === undefined) { all = false; break; }
  }
  const sub = document.getElementById(`qs-${prefix}`);
  if (sub) sub.disabled = !all;
}

function submitQuiz(prefix, questions, accent) {
  let correct = 0;
  questions.forEach((q, qi) => {
    const sel = quizState[`${prefix}-${qi}`];
    q.opts.forEach((_, oi) => {
      const btn = document.getElementById(`qo-${prefix}-${qi}-${oi}`);
      if (!btn) return;
      btn.disabled = true;
      btn.style.borderColor = ""; btn.style.background = "";
      if (oi === q.ans) btn.classList.add("correct");
      else if (oi === sel && sel !== q.ans) btn.classList.add("wrong");
    });
    if (sel === q.ans) correct++;
  });
  const sub = document.getElementById(`qs-${prefix}`);
  if (sub) sub.disabled = true;
  const res = document.getElementById(`qr-${prefix}`);
  const pct = Math.round((correct/questions.length)*100);
  res.className = correct === questions.length ? "quiz-result pass" : "quiz-result fail";
  res.textContent = correct === questions.length
    ? `🎉 Perfect! ${correct}/${questions.length} (${pct}%)`
    : `${correct}/${questions.length} correct (${pct}%) — review and try again!`;
}
